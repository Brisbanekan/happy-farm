<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title>開心農場 Happy Farm</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;color:#3e2723;
    background:#88c057;-webkit-user-select:none;user-select:none;overflow:hidden;
  }
  #scene{
    position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden;
    background:linear-gradient(#aee6ff 0 22%, #cdeeff 22% 26%, #8fce5a 26% 100%);
  }
  /* 等角草地地面：往遠處延伸 + 淡淡菱形紋理 */
  .ground{position:absolute;left:0;right:0;top:24%;bottom:0;z-index:0;overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% 100%, #a8df74 0 45%, #8fce5a 72%, #79b94a 100%);
  }
  .ground::after{content:"";position:absolute;left:0;right:0;top:0;height:38px;
    background:linear-gradient(#0000004d,transparent);}
  .horizon{position:absolute;left:0;right:0;top:24%;height:5px;background:#7fbf4a;box-shadow:0 -2px 6px #5a9a3a55;z-index:0;}
  /* 地面等角網格：與田地同一套座標（rotate45 + scaleY.5、相同格距），所以田地會貼齊格線 */
  .groundgrid{position:absolute;left:28%;top:56%;width:1600px;height:1600px;z-index:0;
    transform:translate(-50%,-50%) scaleY(.5) rotate(45deg);
    background-image:
      linear-gradient(#ffffff20 0 2px, transparent 2px),
      linear-gradient(90deg,#0000001c 0 2px, transparent 2px);
    background-size:100px 100px;background-position:50px 50px;
    -webkit-mask-image:radial-gradient(closest-side,#000 42%,transparent 78%);
            mask-image:radial-gradient(closest-side,#000 42%,transparent 78%);
  }
  /* 太陽 + 雲 */
  .sun{position:absolute;top:14px;left:85%;width:60px;height:60px;border-radius:50%;
    background:radial-gradient(#fff3a8,#ffd54f);box-shadow:0 0 0 8px #ffe08055,0 0 24px #ffd54f;z-index:1;
    animation:sunpulse 4s ease-in-out infinite;}
  .sun::before,.sun::after{content:"";position:absolute;top:22px;width:7px;height:7px;border-radius:50%;background:#7a4a00;}
  .sun::before{left:16px;} .sun::after{right:16px;}
  .smile{position:absolute;top:32px;left:21px;width:18px;height:9px;border:2px solid #7a4a00;border-top:none;border-radius:0 0 18px 18px;}
  @keyframes sunpulse{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.06);}}
  .cloud{position:absolute;font-size:46px;z-index:1;opacity:.95;filter:drop-shadow(0 2px 2px #0001);animation:drift 22s linear infinite;}
  .cloud.c1{top:6%;left:-12%;}
  .cloud.c2{top:11%;left:-30%;font-size:36px;animation-duration:30s;}
  @keyframes drift{from{transform:translateX(0);}to{transform:translateX(135vw);}}
  /* 站在地面上的直立裝飾（billboard） */
  .deco{position:absolute;pointer-events:none;line-height:1;text-align:center;z-index:3;
    transform-origin:bottom center;filter:drop-shadow(0 5px 2px #00000026);}
  .deco::after{content:"";position:absolute;left:50%;bottom:-5px;width:64%;height:12px;
    transform:translateX(-50%);background:radial-gradient(closest-side,#00000038,transparent);border-radius:50%;z-index:-1;}
  /* 遠景（小、靠近地平線） */
  .house{top:25%;right:6%;font-size:80px;animation:bob 5s ease-in-out infinite;}
  #dog{position:absolute;left:80%;top:82%;z-index:3;font-size:42px;pointer-events:none;
    transform:translate(-50%,-50%);filter:drop-shadow(0 4px 2px #00000022);}
  #dog::after{content:"";position:absolute;left:50%;bottom:-3px;width:58%;height:9px;transform:translateX(-50%);
    background:radial-gradient(closest-side,#00000033,transparent);border-radius:50%;z-index:-1;}
  #dog .dogbody{display:inline-block;animation:hop .7s ease-in-out infinite;transition:transform .2s;}
  .barn{top:27%;left:6%;font-size:62px;}
  .tfar1{top:25.5%;left:24%;font-size:34px;animation:sway 5s ease-in-out infinite;}
  .tfar2{top:25.5%;left:33%;font-size:30px;animation:sway 6s ease-in-out infinite;}
  .tfar3{top:26%;right:38%;font-size:32px;animation:sway 5.5s ease-in-out infinite;}
  /* 中景（側邊） */
  .tree1{top:40%;left:1.5%;font-size:62px;animation:sway 5s ease-in-out infinite;}
  .tree2{top:33%;right:1.5%;font-size:58px;animation:sway 6s ease-in-out infinite;}
  .cow{top:33%;right:13%;font-size:34px;animation:bob 3.6s ease-in-out infinite;}
  .hen{top:62%;left:7%;font-size:26px;animation:bob 2.8s ease-in-out infinite;}
  /* 近景（大、靠下） */
  .flowerbush{bottom:23%;left:4%;font-size:34px;}
  .flowerbush2{bottom:22%;right:6%;font-size:34px;}
  .scarecrow{bottom:25%;right:20%;font-size:40px;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  @keyframes sway{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
  /* 池塘 */
  .pond{position:absolute;left:5%;bottom:26%;width:120px;height:54px;z-index:2;
    background:radial-gradient(closest-side,#bfeaff,#7fc4ee 70%,#5aa6da);
    border-radius:50%;box-shadow:inset 0 4px 8px #ffffff66, inset 0 -6px 10px #2f7fb055, 0 3px 6px #00000022;
    transform:scaleY(.62);}
  /* 通往農場的泥土小徑 */
  .path{position:absolute;left:50%;bottom:18%;width:150px;height:120px;z-index:1;
    background:linear-gradient(#caa867,#b8945200);border-radius:50% 50% 0 0/40% 40% 0 0;
    transform:translateX(-50%) scaleY(.7);opacity:.8;}
  /* 白色柵欄 */
  .fence{position:absolute;left:0;right:0;height:26px;display:flex;justify-content:space-around;pointer-events:none;}
  .fence.bottom{bottom:90px;}
  .fence span{width:10px;background:#fff;border:1px solid #cbb;border-radius:3px 3px 0 0;position:relative;box-shadow:0 1px 2px #0002;}
  .fence span::after{content:"";position:absolute;left:-6px;right:-6px;top:7px;height:5px;background:#fff;border:1px solid #cbb;border-radius:2px;}

  /* 田地網格（略帶透視） */
  .fieldshadow{position:absolute;left:28%;top:73%;width:680px;height:120px;transform:translate(-50%,-50%);
    background:radial-gradient(closest-side,#00000030,transparent 72%);border-radius:50%;filter:blur(5px);z-index:1;}
  .field{
    position:absolute;left:28%;top:56%;transform:translate(-50%,-50%) scaleY(.5) rotate(45deg);z-index:2;
  }
  .grid{
    display:grid;grid-template-columns:repeat(7,97px);grid-auto-rows:97px;gap:3px;
    background:#4a3019;padding:6px;border-radius:6px;
    box-shadow:0 0 0 5px #6b4a2f, 0 0 0 8px #8a6038;
  }
  @media(max-width:560px){.grid{grid-template-columns:repeat(3,70px);grid-auto-rows:70px;}}
  .plot{
    position:relative;border-radius:3px;cursor:pointer;z-index:1;
    background:
      radial-gradient(circle at 50% 45%, #8a6240 0 42%, transparent 44%),
      repeating-linear-gradient(95deg,#7a5436 0 9px,#6b4a2f 9px 18px);
    box-shadow:inset 0 0 0 1px #5a3c2266, inset 0 -5px 7px #00000033;
    display:flex;align-items:center;justify-content:center;transition:filter .15s,transform .08s;
  }
  .plot:active{filter:brightness(1.12);}
  .plot.untilled{background:radial-gradient(circle at 50% 40%,#9c7a52,#876641);box-shadow:inset 0 0 0 1px #5a3c2244,inset 0 -4px 6px #00000022;}
  .plot.dry{filter:brightness(1.3) saturate(.55) sepia(.2);}
  .plot.ripe{z-index:3;box-shadow:inset 0 -5px 7px #00000033,0 0 0 3px #ffe06b,0 0 16px #ffca28;animation:ripepop 1.6s ease-in-out infinite;}
  .plot.locked{background:radial-gradient(circle at 50% 40%,#a4dd6e,#86c451);cursor:pointer;box-shadow:inset 0 0 0 1px #6aa83f99,inset 0 -4px 6px #00000022;}
  @keyframes ripepop{0%,100%{box-shadow:inset 0 -5px 7px #00000033,0 0 0 3px #ffe06b,0 0 12px #ffca28;}50%{box-shadow:inset 0 -5px 7px #00000033,0 0 0 4px #fff0a0,0 0 20px #ffd54f;}}
  .crop{font-size:34px;line-height:1;transform:rotate(-45deg) scaleY(2) translateY(-5px);filter:drop-shadow(0 3px 2px #0004);animation:cropsway 3s ease-in-out infinite;transform-origin:bottom center;}
  .plot.ripe .crop{animation:cropbounce 1.4s ease-in-out infinite;}
  @keyframes cropsway{0%,100%{rotate:-5deg;}50%{rotate:5deg;}}
  @keyframes cropbounce{0%,100%{scale:1;}50%{scale:1.14;}}
  @media(max-width:560px){.crop{font-size:34px;}}
  .ov{position:absolute;font-size:16px;pointer-events:none;transform:rotate(-45deg) scaleY(2);}
  .ov.dry{top:1px;left:3px;}
  .ov.weed{bottom:0px;left:2px;}
  .ov.bug{top:0px;right:2px;}
  .progress{position:absolute;left:50%;top:56%;width:44px;height:7px;margin-left:-22px;background:#0005;border-radius:4px;overflow:hidden;transform:rotate(-45deg) scaleY(2);}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,#ffe082,#ffb300);}
  .signpost{
    position:absolute;font-size:11px;font-weight:800;color:#5a3a1a;background:#f3e2b8;
    border:2px solid #b88a3e;border-radius:8px;padding:3px 7px;white-space:nowrap;
    transform:rotate(-45deg) scaleY(2);box-shadow:0 2px 0 #8a6020;
  }

  /* 左上 HUD */
  .hud{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:6px;z-index:20;}
  .hudrow{display:flex;align-items:center;gap:6px;}
  .avatar{
    width:52px;height:52px;border-radius:50%;background:#ffe0b2;border:3px solid #fff;
    display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 2px 6px #0003;
  }
  .namebox{background:#0006;color:#fff;font-size:11px;font-weight:700;border-radius:8px;padding:2px 8px;text-align:center;margin-top:2px;}
  .xpwrap{display:flex;flex-direction:column;gap:3px;}
  .xpbar{width:150px;height:14px;background:#3e2c1e;border:2px solid #fff;border-radius:9px;overflow:hidden;position:relative;box-shadow:0 2px 4px #0003;}
  .xpbar>i{display:block;height:100%;background:linear-gradient(#aed581,#7cb342);width:0;transition:width .3s;}
  .xpbar span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 1px #0008;}
  .lvbadge{width:26px;height:26px;border-radius:50%;background:radial-gradient(#ffd95e,#f5a623);border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#7a4a00;box-shadow:0 2px 4px #0003;}
  .coins{display:flex;gap:6px;}
  .coin{display:flex;align-items:center;gap:4px;background:#fffbe6;border:2px solid #f0c544;border-radius:14px;padding:2px 9px;font-size:13px;font-weight:800;color:#7a5a10;box-shadow:0 2px 4px #0002;}
  .coin.blue{background:#e7f3ff;border-color:#7bb8ee;color:#1c5a96;}
  .coin.charm{background:#ffe9ef;border-color:#f3a3bb;color:#b03a5e;}

  /* 右側直立工具列 */
  .tools{position:absolute;top:50%;right:8px;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;z-index:20;}
  .tool{
    width:48px;height:48px;border-radius:50%;background:#fffef6;border:3px solid #f3d9a8;
    display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;
    box-shadow:0 3px 0 #e0c389;position:relative;transition:transform .08s;
  }
  .tool:active{transform:translateY(2px);box-shadow:0 1px 0 #e0c389;}
  .tool.sel{background:#fff2bf;border-color:#f5b733;box-shadow:0 0 0 3px #ffe06b,0 3px 0 #d9a300;transform:scale(1.06);}
  .tool .lbl{position:absolute;right:50px;top:50%;transform:translateY(-50%);background:#0008;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;opacity:0;transition:.15s;pointer-events:none;}
  .tool:hover .lbl{opacity:1;}

  /* 底部圖示列 */
  .dock{
    position:absolute;left:0;right:0;bottom:0;height:84px;display:flex;align-items:center;justify-content:center;gap:8px;
    background:linear-gradient(#9ed26a,#79b84d);border-top:4px solid #5e9437;z-index:20;padding:0 10px;
    box-shadow:0 -3px 10px #0002;border-radius:24px 24px 0 0;
  }
  .dock .grp{display:flex;gap:7px;align-items:center;}
  .dock .sp{width:3px;height:42px;background:#ffffff77;border-radius:3px;margin:0 4px;}
  .dbtn{
    width:62px;height:62px;border-radius:18px;background:#fffef6;border:3px solid #ffe0ad;
    display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:27px;line-height:1;
    box-shadow:0 4px 0 #e6c486;transition:transform .08s;
  }
  .dbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #e6c486;}
  .dbtn:hover{transform:translateY(-2px);}
  .dbtn small{font-size:10px;font-weight:800;color:#8a7350;margin-top:2px;}

  /* 小牧場：直接圈在草地上的柵欄，動物自由走動 */
  .pen{position:absolute;left:64%;top:41%;transform:translate(-50%,-50%);width:610px;height:340px;z-index:4;}
  .penfence{position:absolute;inset:0;pointer-events:none;z-index:1;}
  .penfence svg{width:100%;height:100%;overflow:visible;display:block;}
  .penground{position:absolute;inset:0;z-index:2;}
  .penlabel{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:800;color:#6b4a1f;
    background:#ffffffd8;padding:2px 10px;border-radius:9px;z-index:3;box-shadow:0 1px 2px #0002;white-space:nowrap;}
  .penadd{position:absolute;top:2px;right:16%;z-index:3;width:30px;height:30px;border-radius:50%;
    background:#fffef6;border:2px solid #f0c544;color:#c9920f;font-size:20px;font-weight:900;
    display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 0 #e0b048;}
  .penadd:active{transform:translateY(2px);box-shadow:none;}
  .animal{position:absolute;font-size:30px;cursor:pointer;will-change:left,top;transform:translate(-50%,-50%);}
  .animal .body{display:inline-block;animation:hop 1.1s ease-in-out infinite;filter:drop-shadow(0 3px 1px #0004);transition:transform .3s;}
  .animal .bubble{position:absolute;left:50%;top:-20px;transform:translateX(-50%);font-size:18px;opacity:0;
    transition:opacity .25s;pointer-events:none;}
  .animal.ready .bubble{opacity:1;animation:bob 1.1s ease-in-out infinite;}
  .animal.ready .body{filter:drop-shadow(0 0 7px #ffd54f) drop-shadow(0 3px 1px #0004);}
  @keyframes hop{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  @media(max-width:980px){.pen{width:470px;height:262px;left:60%;}.animal{font-size:26px;}}
  /* 手機：隱藏多餘裝飾、避免擁擠（田與牧場改由 layout() 上下排列） */
  @media(max-width:900px){
    .barn,.cow,.hen,.tfar1,.tfar2,.tfar3,.scarecrow,.flowerbush,.flowerbush2{display:none;}
    .tree1{top:24%;left:1%;font-size:40px;} .tree2{top:20%;right:1%;font-size:38px;}
    .house{top:13%;right:3%;font-size:60px;} .penlabel{font-size:11px;}
  }
  /* 場景切換（農場 / 牧場） */
  .sceneswitch{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:25;display:flex;gap:2px;
    background:#fffef6ea;border:2px solid #d9c9a6;border-radius:24px;padding:3px;box-shadow:0 3px 8px #0003;}
  .sceneswitch button{border:none;background:none;border-radius:20px;padding:7px 18px;font-size:14px;font-weight:800;cursor:pointer;color:#9a8763;white-space:nowrap;}
  .sceneswitch button.on{background:#aed581;color:#33691e;box-shadow:0 1px 3px #0002;}
  #scene.s-farm .pen{display:none;}
  #scene.s-ranch .field,#scene.s-ranch .fieldshadow,#scene.s-ranch .groundgrid,#scene.s-ranch .tools{display:none;}
  @media(max-width:760px){ .sceneswitch{top:auto;bottom:96px;} }
  /* 登入畫面 */
  .loginmask{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
    background:linear-gradient(#aee6ff,#bfe39a 55%,#8fce5a);}
  .loginmask.on{display:flex;}
  .loginbox{background:#fffdf5;border:3px solid #d7ccc8;border-radius:22px;padding:28px 26px;max-width:340px;width:88%;
    text-align:center;box-shadow:0 12px 30px #0004;}
  .loginbox h2{color:#3e2723;}
  .googlebtn{display:inline-flex;align-items:center;gap:8px;border:2px solid #cdbb95;background:#fff;border-radius:14px;
    padding:11px 20px;font-size:15px;font-weight:800;color:#3e2723;cursor:pointer;box-shadow:0 3px 0 #d7ccc8;}
  .googlebtn:active{transform:translateY(2px);box-shadow:0 1px 0 #d7ccc8;}
  /* 左側功能按鈕（每日 / 拉霸 / 股市） */
  .leftbar{position:absolute;top:50%;left:8px;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:20;}
  .leftbar .lbtn{width:54px;height:54px;border-radius:16px;background:#fffef6;border:3px solid #ffe0ad;
    display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:24px;line-height:1;
    box-shadow:0 4px 0 #e6c486;transition:transform .08s;}
  .leftbar .lbtn small{font-size:9px;font-weight:800;color:#8a7350;margin-top:1px;}
  .leftbar .lbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #e6c486;}
  /* 拉霸機 3×3 轉輪 */
  .slotgrid{display:grid;grid-template-columns:repeat(3,58px);grid-auto-rows:58px;gap:6px;justify-content:center;margin:14px auto;}
  .scell{width:58px;height:58px;border:3px solid #d9c9a6;border-radius:12px;background:#fffef6;
    display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:inset 0 2px 5px #0001;transition:.2s;}
  .scell.win{border-color:#ffca28;background:#fff7d6;box-shadow:0 0 12px #ffca28;transform:scale(1.06);}
  /* 底部按鈕變多：窄畫面可橫向捲動 */
  @media(max-width:760px){ .dock{justify-content:flex-start;overflow-x:auto;} .dbtn{flex-shrink:0;}
    .field,.groundgrid,.fieldshadow{left:50%!important;}
    .tools{gap:6px;} .tools .tool{width:46px;height:46px;font-size:21px;}
    .leftbar{gap:6px;} .leftbar .lbtn{width:46px;height:46px;font-size:21px;}
  }

  /* Modal / 通用 */
  .mask{position:fixed;inset:0;background:#0007;display:none;align-items:center;justify-content:center;z-index:50;padding:14px;}
  .mask.on{display:flex;}
  .modal{background:#fffdf5;border-radius:18px;max-width:520px;width:100%;max-height:84vh;overflow:auto;border:3px solid #d7ccc8;}
  .modal h2{margin:0;padding:13px 16px;border-bottom:2px solid #ecdfc9;font-size:17px;display:flex;justify-content:space-between;align-items:center;background:#fff7e6;border-radius:15px 15px 0 0;}
  .modal .body{padding:14px 16px;}
  .x{cursor:pointer;font-size:22px;line-height:1;border:none;background:none;color:#8d7b6a;}
  .shopitem,.invitem,.friend{display:flex;align-items:center;gap:10px;padding:8px;border:2px solid #e6dcc8;border-radius:12px;margin-bottom:8px;background:#fff;}
  .shopitem .e,.invitem .e,.friend .av{font-size:28px;}
  .shopitem .meta,.invitem .meta,.friend .meta{flex:1;}
  .shopitem .meta b{font-size:15px;}
  .shopitem .meta div,.friend .meta div{font-size:12px;color:#8d7b6a;}
  .pbtn{border:2px solid #7cb342;background:#aed581;border-radius:10px;padding:6px 10px;font-weight:700;cursor:pointer;font-size:13px;}
  .pbtn:disabled{opacity:.45;cursor:not-allowed;border-color:#bbb;background:#eee;}
  .pbtn.gold{border-color:#f0c544;background:#fff3c4;color:#7a5a10;}
  .pbtn.blue{border-color:#7bb8ee;background:#e7f3ff;color:#1c5a96;}
  .locktag{font-size:11px;color:#c62828;font-weight:700;}
  .tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .tabs button{border:2px solid #e6dcc8;background:#fff;border-radius:20px;padding:5px 12px;font-weight:700;cursor:pointer;font-size:13px;}
  .tabs button.on{background:#fff3c4;border-color:#f5b733;}
  .hint{font-size:12px;color:#8d7b6a;margin:4px 2px 10px;line-height:1.5;}
  .bigbtn{border:2px solid #7cb342;background:#aed581;border-radius:12px;padding:9px 14px;cursor:pointer;font-size:14px;font-weight:700;width:100%;}

  /* log */
  .logbtn{position:absolute;left:10px;bottom:94px;z-index:30;width:54px;height:54px;font-size:24px;border-radius:16px;}
  .logpanel{position:absolute;left:10px;bottom:156px;width:300px;max-width:62vw;background:#fffdf5f5;border:3px solid #e7c9a8;border-radius:16px;box-shadow:0 6px 18px #0003;z-index:31;display:none;overflow:hidden;}
  .logpanel.on{display:block;}

/* ============ 遊戲狀態 ============ */

};

function newPlot(unlocked){return {unlocked:unlocked,state:"untilled",crop:null,grow:0,stolen:0,
  dry:false,weed:false,bug:0,bugBig:false,ripe:false};}

/* ====== 雲端同步設定（跨裝置） ======
   在 Firebase 免費建立 Realtime Database 後，把網址貼進下面（保留引號）。
   例如： const CLOUD_DB = "https://happy-farm-xxxx-default-rtdb.firebaseio.com";
   留空字串 = 只用本機存檔（不跨裝置）。設定教學見一起提供的「雲端同步設定教學」檔。 */
const CLOUD_DB = "https://happyfarm-9a755-default-rtdb.firebaseio.com";
/* ==================================== */

/* ====== 帳號登入設定（Google 一鍵登入；登入即進度，跨裝置） ======
   到 Firebase 專案 → 專案設定 → 你的應用程式，把網頁設定貼到下面（保留引號）。
   範例：
   const FIREBASE_CONFIG = {
     apiKey:"AIza...", authDomain:"happy-farm-xxxx.firebaseapp.com",
     databaseURL:"https://happy-farm-xxxx-default-rtdb.firebaseio.com",
     projectId:"happy-farm-xxxx", appId:"1:123:web:abc"
   };
   留空 {} = 不啟用帳號登入，遊戲照舊（本機存檔）。 */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDUiN3c9pSiVu3Zj3r-qqNu6MyMyR9wjJo",
  authDomain: "happyfarm-9a755.firebaseapp.com",
  databaseURL: "https://happyfarm-9a755-default-rtdb.firebaseio.com",
  projectId: "happyfarm-9a755",
  storageBucket: "happyfarm-9a755.firebasestorage.app",
  messagingSenderId: "529999689085",
  appId: "1:529999689085:web:a58e014c5a8849bb2b4814"
};
/* ============================================================== */
let fbAuth=null, fbDB=null, fbUser=null, fbSaveTimer=null, cloudReady=false;
function accountMode(){return !!(FIREBASE_CONFIG&&FIREBASE_CONFIG.apiKey&&window.firebase);}
function showLogin(m){const el=document.getElementById("loginMask");if(el)el.classList.add("on");const mm=document.getElementById("loginMsg");if(mm)mm.textContent=m||"";}
function hideLogin(){const el=document.getElementById("loginMask");if(el)el.classList.remove("on");}
function googleLogin(){
  if(!fbAuth){showLogin("尚未設定 Firebase");return;}
  const p=new firebase.auth.GoogleAuthProvider();
  fbAuth.signInWithPopup(p).catch(function(e){ showLogin("登入失敗："+(e&&e.message||e)); });
}
function logoutAccount(){ if(fbAuth)fbAuth.signOut(); }
function initAuth(){
  if(!accountMode())return false;
  try{ firebase.initializeApp(FIREBASE_CONFIG); }catch(e){}
  fbAuth=firebase.auth(); fbDB=firebase.database();
  fbAuth.onAuthStateChanged(function(user){
    fbUser=user||null;
    if(user){ hideLogin(); loadUserCloud(user.uid); }
    else { showLogin(); }
  });
  return true;
}
// 進度分數：用來比較兩份存檔誰「進度比較多」，多的勝出（避免空白存檔覆蓋有進度的）
function progScore(s){ if(!s)return -1; return (s.level||0)*1e7 + (s.totalDays||0)*1e4 + (s.credit||0)*1e3 + Math.min(s.gold||0,1e6) + (s.charm||0)*100; }
function loadUserCloud(uid){
  if(!fbDB)return;
  cloudReady=false;                       // 載入完成前先鎖住雲端寫入，避免覆蓋
  const localScore = progScore(G);         // 本機目前進度分數
  fbDB.ref("users/"+uid).once("value").then(function(snap){
    const d=snap.val();
    if(d&&Array.isArray(d.plots) && progScore(d) >= localScore){
      Object.assign(G,d); normalizeState(); log("☁️ 已載入你的帳號雲端進度。","g");
    } else if(d&&Array.isArray(d.plots)){
      normalizeState(); log("☁️ 本機進度較多，保留本機並上傳（避免被較舊雲端覆蓋）。","b");
    } else {
      normalizeState(); log("☁️ 首次以此帳號登入：沿用本機進度並上傳雲端綁定帳號。","g");
    }
    cloudReady=true;
    dailyCheck(); setScene(G.scene||"farm"); render(); saveUserCloud();
  }).catch(function(e){ log("⚠️ 雲端讀取失敗："+(e&&e.message||e)+"（多半是資料庫規則未發布）","r"); cloudReady=true; render(); });
}
function saveUserCloud(){
  if(!fbDB||!fbUser||!cloudReady)return;   // 尚未載入完成前不寫入
  clearTimeout(fbSaveTimer);
  fbSaveTimer=setTimeout(function(){ try{ G.ts=Date.now(); fbDB.ref("users/"+fbUser.uid).set(JSON.parse(JSON.stringify(G))).catch(function(e){ log("⚠️ 雲端存檔失敗："+(e&&e.message||e)+"（多半是資料庫規則未發布）","r"); }); }catch(e){} }, 1500);
}

const SAVE_KEY="happyfarm_save_v1";
const CODE_KEY="happyfarm_code";
let syncCode = (()=>{try{return localStorage.getItem(CODE_KEY)||"";}catch(e){return "";}})();

function freshGame(){
  G.gold=200;G.credit=5;G.level=1;G.xp=0;G.charm=0;G.tool="hand";
  G.seeds={radish:3};G.harvest={};G.dog=null;G.ferts={f1:0,f2:0,bigspray:0};G.lastDaily="";G.ts=0;G.scene="farm";
  G.streak=0;G.totalDays=0;G.lastClaim="";G.lastMarketDate="";
  G.stocks={};STOCKS.forEach(s=>G.stocks[s.t]={price:s.base,prev:s.base,shares:0,cost:0});
  G.plots=LANDS.map((l,i)=>newPlot(i<6));
  G.ranch=[];
  G.friends=FRIEND_NAMES.map(f=>({name:f[0],av:f[1],plots:Array.from({length:6},()=>makeFriendPlot())}));
}
function normalizeState(){
  if(!Array.isArray(G.plots))G.plots=LANDS.map((l,i)=>newPlot(i<6));
  while(G.plots.length<LANDS.length)G.plots.push(newPlot(false));
  if(G.plots.length>LANDS.length)G.plots.length=LANDS.length;
  if(!Array.isArray(G.friends)||!G.friends.length)
    G.friends=FRIEND_NAMES.map(f=>({name:f[0],av:f[1],plots:Array.from({length:6},()=>makeFriendPlot())}));
  if(!G.ferts)G.ferts={f1:0,f2:0,bigspray:0};
  if(!G.seeds)G.seeds={};
  if(!G.harvest)G.harvest={};
  if(!Array.isArray(G.ranch))G.ranch=[];
  G.ranch=G.ranch.filter(s=>s&&ANIMALS[s.a]); // 過濾舊版空欄位/無效動物
  if(G.scene!=="ranch")G.scene="farm";
  if(typeof G.streak!=="number")G.streak=0;
  if(typeof G.totalDays!=="number")G.totalDays=0;
  if(typeof G.lastClaim!=="string")G.lastClaim="";
  if(typeof G.lastMarketDate!=="string")G.lastMarketDate="";
  if(!G.stocks||typeof G.stocks!=="object")G.stocks={};
  STOCKS.forEach(s=>{const st=G.stocks[s.t]; if(!st||typeof st.price!=="number")G.stocks[s.t]={price:s.base,prev:s.base,shares:0,cost:0};});
  if(G.dog&&typeof G.dog.level!=="number")G.dog.level=1;
}
function saveGame(){try{G.ts=Date.now();localStorage.setItem(SAVE_KEY,JSON.stringify(G));}catch(e){} if(accountMode()&&fbUser){saveUserCloud();} else {cloudPush(false);} }
function loadGame(){
  try{
    const s=localStorage.getItem(SAVE_KEY);if(!s)return false;
    const d=JSON.parse(s);if(!d||!Array.isArray(d.plots))return false;
    Object.assign(G,d);normalizeState();
    return true;
  }catch(e){return false;}
}

/* ====== 雲端讀寫 ====== */
function cloudOn(){return !!CLOUD_DB;}
function cloudUrl(code){return CLOUD_DB.replace(/\/+$/,"")+"/farms/"+encodeURIComponent(code)+".json";}
function genCode(){let s="";const a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";for(let i=0;i<6;i++)s+=a[Math.floor(Math.random()*a.length)];return s;}
let lastPush=0;
function cloudPush(force){
  if(!cloudOn()||!syncCode)return;
  const now=Date.now();
  if(!force && now-lastPush<12000)return;
  lastPush=now;
  try{fetch(cloudUrl(syncCode),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(G)}).catch(()=>{});}catch(e){}
}
function cloudPull(code){
  return fetch(cloudUrl(code)).then(r=>r.ok?r.json():null).then(d=>{
    if(!d||!Array.isArray(d.plots))return false;
    Object.assign(G,d);normalizeState();
    syncCode=code;try{localStorage.setItem(CODE_KEY,code);}catch(e){}
    try{localStorage.setItem(SAVE_KEY,JSON.stringify(G));}catch(e){}
    return true;
  }).catch(()=>false);
}
function cloudCreate(){
  if(!cloudOn())return;
  syncCode=genCode();try{localStorage.setItem(CODE_KEY,syncCode);}catch(e){}
  cloudPush(true);

function doSpin(){
  if(slotSpinning)return;
  if(G.gold<SLOT_COST){toast("金幣不足");return;}
  G.gold-=SLOT_COST;renderHUD();slotSpinning=true;
  const grid=Array.from({length:9},()=>pickSlot());
  const cells=[];for(let i=0;i<9;i++)cells.push(document.getElementById("c"+i));
  cells.forEach(el=>{if(el)el.classList.remove("win");});
  const res=document.getElementById("slotres");if(res)res.textContent="轉動中…";
  let ticks=0;
  const iv=setInterval(()=>{
    cells.forEach(el=>{if(el)el.textContent=SLOT_SYM[Math.floor(Math.random()*SLOT_SYM.length)].s;});
    ticks++;
    if(ticks>=16){clearInterval(iv);cells.forEach((el,i)=>{if(el)el.textContent=grid[i].s;});settleSlot(grid,cells);slotSpinning=false;}
  },70);
}
function settleSlot(grid,cells){
  let winGold=0,winCred=0;const winSet=new Set();
  SLOT_LINES.forEach(line=>{
    const a=grid[line[0]],b=grid[line[1]],c=grid[line[2]];
    if(a.s===b.s&&b.s===c.s){ if(a.cred)winCred+=a.cred; else winGold+=a.pay||0; line.forEach(i=>winSet.add(i)); }
  });
  winSet.forEach(i=>{if(cells[i])cells[i].classList.add("win");});
  if(winGold)G.gold+=winGold; if(winCred)G.credit+=winCred;
  const res=document.getElementById("slotres");
  let msg,col="#999";
  if(winGold||winCred){
    let p=[];if(winGold)p.push("🪙"+winGold);if(winCred)p.push("💎"+winCred);
    msg="🎉 中獎！"+p.join(" ＋ ");col="#2e7d32";toast(msg);log("拉霸中獎 "+p.join(" "),winCred?"b":"g");
  }else msg="沒中，再來一次！";
  if(res)res.innerHTML='<span style="color:'+col+'">'+msg+'</span>';
  renderHUD();saveGame();
}

/* ============ 小牧場（圍欄＋會走動的動物） ============ */
function ranchCap(){return Math.min(8, 2+Math.floor(G.level/3));}
let penNodes=[], penTimers=[];
// 在圓形圍欄內均勻取點（%）：可走到接近柵欄邊，保留前欄杆後方一點距離
function penPos(){const t=Math.random()*Math.PI*2, rr=Math.sqrt(Math.random()); return {x:50+43*rr*Math.cos(t), y:52+22*rr*Math.sin(t)};}
// 從目前位置往附近走一小步（仍在圍欄橢圓內）
function nextTarget(ox,oy){
  for(let k=0;k<10;k++){
    const ang=Math.random()*Math.PI*2, step=5+Math.random()*16;
    const nx=ox+step*Math.cos(ang), ny=oy+step*Math.sin(ang)*0.5;
    if(((nx-50)/43)**2+((ny-52)/22)**2<=1) return {x:nx,y:ny};
  }
  return penPos();
}
// 沿圓角矩形周長取等距點
function roundRectPts(x,y,w,h,r,n){
  const segs=[
    {t:"l",x1:x+r,y1:y,x2:x+w-r,y2:y},
    {t:"a",cx:x+w-r,cy:y+r,r:r,a1:-Math.PI/2,a2:0},
    {t:"l",x1:x+w,y1:y+r,x2:x+w,y2:y+h-r},
    {t:"a",cx:x+w-r,cy:y+h-r,r:r,a1:0,a2:Math.PI/2},
    {t:"l",x1:x+w-r,y1:y+h,x2:x+r,y2:y+h},
    {t:"a",cx:x+r,cy:y+h-r,r:r,a1:Math.PI/2,a2:Math.PI},
    {t:"l",x1:x,y1:y+h-r,x2:x,y2:y+r},
    {t:"a",cx:x+r,cy:y+r,r:r,a1:Math.PI,a2:Math.PI*1.5},
  ];
  const len=s=>s.t==="l"?Math.hypot(s.x2-s.x1,s.y2-s.y1):Math.abs(s.a2-s.a1)*s.r;
  const tot=segs.reduce((a,s)=>a+len(s),0);const out=[];
  for(let i=0;i<n;i++){let d=i/n*tot;for(const s of segs){const L=len(s);if(d<=L){const u=L?d/L:0;
    if(s.t==="l")out.push({px:s.x1+(s.x2-s.x1)*u,py:s.y1+(s.y2-s.y1)*u});
    else{const ang=s.a1+(s.a2-s.a1)*u;out.push({px:s.cx+Math.cos(ang)*s.r,py:s.cy+Math.sin(ang)*s.r});}break;}d-=L;}}
  return out;
}
// 以 SVG 畫出草地上的「立體」圓形柵欄（底圈＋木樁＋上欄杆）
function buildFence(){
  const f=document.getElementById("penFence");if(!f||f.dataset.built)return;f.dataset.built="1";
  const W=610,H=340,ph=18,cx=305,cy=184,rx=284,ry=98;
  let arr=[];const N=30;
  for(let i=0;i<N;i++){const ang=(i/N)*Math.PI*2;arr.push({px:cx+rx*Math.cos(ang),py:cy+ry*Math.sin(ang)});}
  arr.sort((a,b)=>a.py-b.py); // 後方木樁先畫，前方蓋在上面
  let posts="";
  arr.forEach(p=>{
    const x=(p.px-3.2).toFixed(1), yt=(p.py-ph).toFixed(1);
    posts+='<rect x="'+x+'" y="'+yt+'" width="6.4" height="'+ph+'" rx="2.8" fill="url(#postg)" stroke="#7c4f24" stroke-width="0.8"/>'+
      '<ellipse cx="'+p.px.toFixed(1)+'" cy="'+yt+'" rx="3.2" ry="1.7" fill="#e6c187"/>';
  });
  f.innerHTML='<svg viewBox="0 0 '+W+' '+H+'">'+
    '<defs><linearGradient id="postg" x1="0" y1="0" x2="1" y2="0">'+
      '<stop offset="0" stop-color="#e3ba7c"/><stop offset="0.45" stop-color="#bd8447"/><stop offset="1" stop-color="#8f5b2d"/></linearGradient></defs>'+
    '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="none" stroke="#90642f" stroke-width="3.5"/>'+
    posts+
    '<ellipse cx="'+cx+'" cy="'+(cy-ph)+'" rx="'+rx+'" ry="'+ry+'" fill="none" stroke="#a9712f" stroke-width="5.5"/>'+
    '<ellipse cx="'+cx+'" cy="'+(cy-ph+1.4)+'" rx="'+rx+'" ry="'+ry+'" fill="none" stroke="#d9b277" stroke-width="2"/>'+
    '</svg>';
}
function renderPen(){
  buildFence();
  const ground=document.getElementById("penGround");if(!ground)return;
  const lab=document.getElementById("penLabel");if(lab)lab.textContent="🐾 牧場 "+G.ranch.length+"/"+ranchCap();
  for(let i=0;i<G.ranch.length;i++){
    const s=G.ranch[i];const a=ANIMALS[s.a];
    if(!penNodes[i]){
      const el=document.createElement("div");el.className="animal";
      el.innerHTML='<span class="bubble">'+a.prod+'</span><span class="body">'+a.emoji+'</span>';
      if(s.x==null||s.y==null){const p=penPos();s.x=p.x;s.y=p.y;}
      el.style.transition="none";
      el.style.left=s.x+"%";el.style.top=s.y+"%";el.style.zIndex=Math.round(s.y);
      el.addEventListener("click",(function(idx){return function(){tapAnimal(idx);};})(i));
      ground.appendChild(el);penNodes[i]=el;
      scheduleWalk(i, 400+Math.random()*1600);
    }
    penNodes[i].classList.toggle("ready",!!s.ready);
  }
  for(let i=G.ranch.length;i<penNodes.length;i++){if(penNodes[i]){clearTimeout(penTimers[i]);penNodes[i].remove();penNodes[i]=null;}}
  penNodes.length=G.ranch.length;
}
const ANIMAL_SPEED=42; // 固定步行速度（像素/秒），數字越小走越慢
function scheduleWalk(i,delay){clearTimeout(penTimers[i]);penTimers[i]=setTimeout(function(){walkAnimal(i);},delay);}
function walkAnimal(i){
  const el=penNodes[i], s=G.ranch[i]; if(!el||!s)return;
  const pen=document.getElementById("pen");
  const W=pen?pen.offsetWidth:610, H=pen?pen.offsetHeight:340;
  const ox=(s.x==null?50:s.x), oy=(s.y==null?52:s.y);
  const p=nextTarget(ox,oy);
  const dpx=(p.x-ox)/100*W, dpy=(p.y-oy)/100*H;
  const dist=Math.hypot(dpx,dpy);
  let dur=dist/ANIMAL_SPEED; dur=Math.max(0.6,Math.min(dur,4));
  const body=el.querySelector(".body");
  if(body&&Math.abs(p.x-ox)>0.3)body.style.transform="scaleX("+(p.x<ox?-1:1)+")";
  el.style.transition="left "+dur.toFixed(2)+"s linear, top "+dur.toFixed(2)+"s linear";
  s.x=p.x;s.y=p.y;el.style.left=p.x+"%";el.style.top=p.y+"%";el.style.zIndex=Math.round(p.y);
  scheduleWalk(i, dur*1000 + 700 + Math.random()*1800); // 抵達後停一下再走
}
function tapAnimal(i){
  const s=G.ranch[i];if(!s)return;const a=ANIMALS[s.a];
  if(s.ready){
    G.gold+=a.yield;gainXp(a.xp);s.ready=false;s.prod=0;
    if(penNodes[i])penNodes[i].classList.remove("ready");
    log("收成 "+a.emoji+a.name+" 的 "+a.prod+" ＝ 🪙"+a.yield,"g");toast("🪙 +"+a.yield);
    renderHUD();saveGame();
  }else toast(a.emoji+a.name+" 生產中…");
}
function clearPen(){
  for(let i=0;i<penNodes.length;i++){clearTimeout(penTimers[i]);if(penNodes[i])penNodes[i].remove();}
  penNodes=[];penTimers=[];
  const g=document.getElementById("penGround");if(g)g.innerHTML="";
}
function sellRefund(k){return Math.floor(ANIMALS[k].cost*0.5);}
function openRanch(){

        '<button class="pbtn" style="background:#ffe3e3;border-color:#e98a8a;color:#a23b3b" onclick="sellAnimal('+i+')">售出 🪙'+sellRefund(s.a)+'</button></div>';

    (G.ranch.length>=cap?'<br><span class="locktag">牧場已滿，提升等級可增加容量。</span>':'')+'</p>';

      '<div>每 '+a.time+'s 產 '+a.prod+' ＝ 🪙'+a.yield+' ｜ 經驗 '+a.xp+(locked?' ｜ <span class="locktag">需 Lv.'+a.lvl+'</span>':'')+'</div></div>'+
      '<button class="pbtn gold" onclick="buyAnimal(\''+k+'\')" '+(can?'':'disabled')+'>🪙'+a.cost+'</button></div>';

function buyAnimal(k){
  const a=ANIMALS[k];const cap=ranchCap();
  if(G.level<a.lvl||G.gold<a.cost||G.ranch.length>=cap)return;
  G.gold-=a.cost;G.ranch.push({a:k,prod:0,ready:false,x:null,y:null});

function sellAnimal(i){

  clearPen();renderPen();renderHUD();saveGame();

function renderHUD(){
  document.getElementById("goldChip").textContent="🪙 "+G.gold;
  document.getElementById("creditChip").textContent="💎 "+G.credit;
  document.getElementById("charmChip").textContent="❤️ "+G.charm;
  document.getElementById("lvBadge").textContent=G.level;
  const need=XP_NEED(G.level);
  document.getElementById("xpFill").style.width=Math.min(100,G.xp/need*100)+"%";

}
function renderGrid(){
  const grid=document.getElementById("grid");grid.innerHTML="";
  G.plots.forEach((p,i)=>{
    const d=document.createElement("div");
    if(!p.unlocked){
      d.className="plot locked";
      const firstLocked=G.plots.findIndex(x=>!x.unlocked);
      if(i===firstLocked){const L=LANDS[i];d.innerHTML='<div class="signpost">🪧 Buy Land<br>Lv.'+L.lvl+' · 🪙'+L.price+'</div>';}
      d.onclick=()=>buyLand(i);grid.appendChild(d);return;
    }
    let cls="plot";let inner="";

    else if(p.state==="planted"){
      const c=CROPS[p.crop];const total=c.grow;
      if(p.ripe){inner='<span class="crop">'+c.grown+'</span>';cls+=" ripe";}
      else{const idx=Math.min(3,Math.floor(p.grow/total*4));inner='<span class="crop" style="font-size:'+(22+idx*4)+'px">'+STAGE[idx]+'</span><div class="progress"><i style="width:'+Math.min(100,p.grow/total*100)+'%"></i></div>';}
    }

    d.innerHTML=inner
      +(p.dry?'<span class="ov dry">💧</span>':'')
      +(p.weed?'<span class="ov weed">🌿</span>':'')

/* ============ 點田地 ============ */
function tapPlot(i){
  const p=G.plots[i];const t=G.tool;
  if(t==="till"){
    if(p.state==="untilled"){p.state="tilled";gainXp(1);log("翻土完成，可以播種了。");}
    else if(p.state==="harvested"){p.state="tilled";gainXp(1);log("整理好枯田，可重新播種。");}
    else toast("這塊地不需要翻土");
  }else if(t==="plant"){
    if(p.state!=="tilled"){toast("要先用 🔨 翻土");return;}
    plantOn(i);
  }else if(t==="water"){ if(p.dry){p.dry=false;gainXp(1);log("澆水 💧 +經驗");}else toast("這塊地不缺水"); }
  else if(t==="weed"){ if(p.weed){p.weed=false;gainXp(1);log("除草 🌿 +經驗");}else toast("沒有雜草"); }
  else if(t==="bug"){
    if(!p.bug){toast("沒有蟲");return;}
    if(p.bugBig){p.bug--;if(p.bug<=0){p.bug=0;p.bugBig=false;gainXp(2);log("大毛毛蟲被消滅了！🎉","g");}else{gainXp(1);log("大毛毛蟲還要噴 "+p.bug+" 次（可用💎大蟲殺蟲劑一次解決）","r");}}
    else{p.bug=0;gainXp(1);log("殺蟲 🐜 +經驗");}
  }else if(t==="hand"){
    if(p.state==="planted"&&p.ripe)harvest(i);
    else if(p.state==="planted")toast("還沒成熟");
    else toast("選 🔨 翻土或 🌱 播種");
  }else if(t==="fert"){
    if(p.state==="planted"&&!p.ripe)openFertPick(i);else toast("只能對成長中的作物施肥");
  }
  render();
}
function plantOn(i){
  const avail=Object.keys(G.seeds).filter(k=>G.seeds[k]>0);
  if(avail.length===0){toast("沒有種子，去 🛒 商店買");openShop();return;}
  if(window.__plantSel&&G.seeds[window.__plantSel]>0){doPlant(i,window.__plantSel);return;}
  if(avail.length===1){doPlant(i,avail[0]);return;}
  openSeedPick(i,avail);
}
function openSeedPick(i,avail){
  let h='<h2>🌱 選擇種子 <button class="x" onclick="closeM()">×</button></h2><div class="body">';
  avail.forEach(k=>{const c=CROPS[k];h+='<div class="shopitem"><span class="e">'+c.emoji+'</span><div class="meta"><b>'+c.name+'</b> ×'+G.seeds[k]+'</div><button class="pbtn" onclick="doPlant('+i+",'"+k+"');closeM()\">種下</button></div>";});
  h+='</div>';showM(h);
}
function doPlant(i,key){
  const p=G.plots[i];G.seeds[key]--;if(G.seeds[key]<=0)delete G.seeds[key];
  Object.assign(p,{state:"planted",crop:key,grow:0,ripe:false,stolen:0,dry:false,weed:false,bug:0,bugBig:false});
  window.__plantSel=key;gainXp(1);log("播種 "+CROPS[key].emoji+CROPS[key].name);render();
}
function harvest(i){
  const p=G.plots[i];const c=CROPS[p.crop];
  let qty=4-p.stolen;if(!p.dry&&!p.weed&&!p.bug)qty+=1;qty=Math.max(1,qty);
  G.harvest[p.crop]=(G.harvest[p.crop]||0)+qty;gainXp(c.xp);
  if(c.type==="flower"){G.charm+=c.charm;log("收成 "+c.emoji+c.name+" ×"+qty+"，魅力 +"+c.charm+" ❤️","b");}
  else log("收成 "+c.emoji+c.name+" ×"+qty+"！記得到倉庫賣錢","g");
  Object.assign(p,{state:"harvested",crop:null,ripe:false,grow:0,dry:false,weed:false,bug:0,bugBig:false,stolen:0});
}

/* ============ 經驗 / 升級 ============ */
function gainXp(n){
  G.xp+=n;
  while(G.xp>=XP_NEED(G.level)){
    G.xp-=XP_NEED(G.level);G.level++;G.credit+=1;G.charm+=2;
    log("🎉 升級！Lv."+G.level+" 獎勵 💎1 ＋ ❤️2，可種更高級作物、買新農地。","g");
    toast("⭐ 升級 Lv."+G.level+"（+💎1 +❤️2）");
  }
  renderHUD();
}
/* ============ 買地 ============ */
function buyLand(i){
  const L=LANDS[i];const p=G.plots[i];if(p.unlocked)return;
  const firstLocked=G.plots.findIndex(x=>!x.unlocked);
  if(i!==firstLocked){toast("請先購買前面的農地");return;}
  if(G.level<L.lvl){toast("需要 Lv."+L.lvl+" 才能購買");return;}
  if(G.gold<L.price){toast("金幣不足");return;}
  G.gold-=L.price;p.unlocked=true;log("購買新農地（🪙"+L.price+"），農場變大了！","g");render();
}

}
function buySeed(k){const c=CROPS[k];if(G.level<c.lvl||G.charm<(c.charmReq||0)||G.gold<c.cost)return;G.gold-=c.cost;G.seeds[k]=(G.seeds[k]||0)+1;toast("買了 "+c.name+" 種子");renderHUD();openShop(c.type);}
function buyFert(k){const f=FERTS[k];if(f.cur==="blue"){if(G.credit<f.cost)return;G.credit-=f.cost;}else{if(G.gold<f.cost)return;G.gold-=f.cost;}G.ferts[k]=(G.ferts[k]||0)+1;toast("買了 "+f.name);renderHUD();openShop("fert");}

function sqClamp(k){const el=document.getElementById("sq_"+k);if(!el)return;let n=parseInt(el.value)||1;const mx=G.harvest[k]||1;if(n<1)n=1;if(n>mx)n=mx;el.value=n;}
function sqStep(k,d){const el=document.getElementById("sq_"+k);if(!el)return;let n=(parseInt(el.value)||1)+d;const mx=G.harvest[k]||1;if(n<1)n=1;if(n>mx)n=mx;el.value=n;}
function sellQtyInput(k){const el=document.getElementById("sq_"+k);let n=parseInt(el&&el.value)||1;sellQty(k,n);}
function sellQty(k,n){if(!G.harvest[k])return;n=Math.max(1,Math.min(n,G.harvest[k]));G.gold+=CROPS[k].sell*n;G.harvest[k]-=n;if(G.harvest[k]<=0)delete G.harvest[k];toast("賣出 "+CROPS[k].name+" ×"+n+"，得 🪙"+(CROPS[k].sell*n));renderHUD();saveGame();openInv("harvest");}
function sellOne(k){sellQty(k,1);}
function sellAll(k){if(!G.harvest[k])return;G.gold+=CROPS[k].sell*G.harvest[k];delete G.harvest[k];toast("全部賣出！");renderHUD();saveGame();openInv("harvest");}
function sellEverything(){let t=0;Object.keys(G.harvest).forEach(k=>t+=CROPS[k].sell*G.harvest[k]);G.gold+=t;G.harvest={};log("倉庫全部賣出，獲得 🪙"+t,"g");toast("🪙 +"+t);renderHUD();saveGame();openInv("harvest");}
function selectSeed(k){window.__plantSel=k;G.tool="plant";renderTools();toast("已選 "+CROPS[k].name+"，點翻好的田播種");closeM();}

    else inner='<span style="font-size:24px">🌿</span>';
    const glow=(p.crop&&p.ripe&&p.stolen<2)?"box-shadow:0 0 0 3px #ffd54f,0 0 12px #ffca28;":"";
    h+='<div onclick="friendTap('+idx+')" style="position:relative;aspect-ratio:1/1;border-radius:10px;border:2px solid #4a3019;cursor:pointer;display:flex;align-items:center;justify-content:center;'+bg+glow+'">'+inner+
      (p.dry?'<span class="ov dry" style="position:absolute;top:1px;left:3px">💧</span>':'')+
      (p.weed?'<span class="ov weed" style="position:absolute;bottom:0;left:2px">🌿</span>':'')+
      (p.bug?'<span class="ov bug" style="position:absolute;top:0;right:2px">🐜</span>':'')+'</div>';
  });
  h+='</div>';
  h+='<div class="tabs" style="margin-top:10px;justify-content:center">'+
    '<button class="'+(G.tool==='hand'?'on':'')+'" onclick="setFTool(\'hand\')">✋ 偷菜</button>'+
    '<button class="'+(G.tool==='water'?'on':'')+'" onclick="setFTool(\'water\')">💧 澆水</button>'+
    '<button class="'+(G.tool==='weed'?'on':'')+'" onclick="setFTool(\'weed\')">🌿 除草</button>'+
    '<button class="'+(G.tool==='bug'?'on':'')+'" onclick="setFTool(\'bug\')">🐛 殺蟲</button></div>'+
    '<button class="bigbtn" style="background:#e7f3ff;border-color:#7bb8ee;margin-top:6px" onclick="openFriends()">← 返回好友名單</button></div>';
  showM(h);
}
function setFTool(t){G.tool=t;visitFriend(curFriend);}
function friendTap(idx){
  const f=G.friends[curFriend];const p=f.plots[idx];if(!p.crop){toast("空地");return;}
  if(G.tool==="hand"){
    if(!p.ripe){toast("還沒成熟，不能偷");return;}
    if(p.stolen>=2){toast("這塊已被偷光了");return;}
    if(Math.random()<0.18){const fine=15+Math.floor(Math.random()*30);G.gold=Math.max(0,G.gold-fine);log("你在 "+f.name+" 家偷菜被狗咬了！🐕 掉了 🪙"+fine,"r");toast("被狗咬！掉錢 😱");}
    else{const q=1+Math.floor(Math.random()*3);p.stolen++;const c=CROPS[p.crop];G.harvest[p.crop]=(G.harvest[p.crop]||0)+q;gainXp(2);log("偷到 "+f.name+" 的 "+c.emoji+c.name+" ×"+q+"！😏","b");toast("偷到 "+c.name+" ×"+q);}
  }else if(G.tool==="water"){if(p.dry){p.dry=false;gainXp(1);toast("幫忙澆水 +經驗");}else toast("不缺水");}
  else if(G.tool==="weed"){if(p.weed){p.weed=false;gainXp(1);toast("幫忙除草 +經驗");}else toast("沒雜草");}
  else if(G.tool==="bug"){if(p.bug){p.bug=0;gainXp(1);toast("幫忙殺蟲 +經驗");}else toast("沒有蟲");}
  renderHUD();visitFriend(curFriend);
}

/* ============ 養狗 ============ */
function dogBiteChance(lv){return Math.min(0.9, 0.30+((lv||1)-1)*0.13);} // Lv1=30%…Lv5=82%
function dogUpCost(lv){return 3000*(lv||1);}
function openDog(){
  let h='<h2>🐕 養狗 <button class="x" onclick="closeM()">×</button></h2><div class="body"><p class="hint">看門狗會巡守農場，當好友來偷成熟作物時有機率咬住對方，讓對方失手、把偷到的東西掉一部分變成 🪙 給你。升級可提高咬中機率與掉落金額。狗要餵食才會咬人。</p>';
  if(!G.dog){
    h+='<div class="shopitem"><span class="e">🐶</span><div class="meta"><b>看門狗 Lv.1</b><div>購買後守護你的農場</div></div><button class="pbtn gold" onclick="buyDog(\'gold\')" '+(G.gold>=1500?'':'disabled')+'>🪙1500</button> <button class="pbtn blue" onclick="buyDog(\'blue\')" '+(G.credit>=3?'':'disabled')+'>💎3</button></div>';
  }else{
    const lv=G.dog.level||1; const ch=Math.round(dogBiteChance(lv)*100);
    h+='<div class="shopitem"><span class="e">🐕</span><div class="meta"><b>你的看門狗 Lv.'+lv+'</b><div>咬中機率約 '+ch+'%｜對方掉落金額隨等級提高<br>狀態：'+(G.dog.fed?"✅ 已餵食，會咬偷菜賊":"⚠️ 未餵食，無法咬人")+'</div></div><button class="pbtn" onclick="feedDog()">餵食 (🪙300)</button></div>';
    if(lv<5){const cost=dogUpCost(lv);
      h+='<div class="shopitem"><span class="e">⬆️</span><div class="meta"><b>升級到 Lv.'+(lv+1)+'</b><div>咬中機率 '+ch+'% → '+Math.round(dogBiteChance(lv+1)*100)+'%，掉落金額更多</div></div><button class="pbtn gold" onclick="upgradeDog()" '+(G.gold>=cost?'':'disabled')+'>🪙'+cost+'</button></div>';
    }else h+='<p class="hint">看門狗已達最高 Lv.5 🎉</p>';
  }
  h+='</div>';showM(h);
}
function buyDog(cur){if(cur==="gold"){if(G.gold<1500)return;G.gold-=1500;}else{if(G.credit<3)return;G.credit-=3;}G.dog={fed:false,level:1};log("買了一隻看門狗 🐕","g");renderHUD();saveGame();openDog();}
function feedDog(){if(G.gold<300){toast("金幣不足");return;}G.gold-=300;G.dog.fed=true;toast("狗狗吃飽了 🦴");renderHUD();saveGame();openDog();}
function upgradeDog(){if(!G.dog)return;const lv=G.dog.level||1;if(lv>=5)return;const cost=dogUpCost(lv);if(G.gold<cost)return;G.gold-=cost;G.dog.level=lv+1;log("看門狗升級到 Lv."+(lv+1)+"！","g");toast("🐕 升級 Lv."+(lv+1));renderHUD();saveGame();openDog();}

  '<label class="pbtn gold" style="cursor:pointer;display:inline-block">⬆️ 匯入存檔<input type="file" accept="application/json,.json" style="display:none" onchange="importSave(this)"></label>'+

      '<button class="pbtn gold" onclick="cloudJoin()">讀取</button>'+

/* ============ 右下角散步的狗 ============ */
let dogTimer;
function walkDog(){
  const d=document.getElementById("dog");if(!d)return;
  const ox=parseFloat(d.dataset.x||"80"), oy=parseFloat(d.dataset.y||"82");
  const nx=66+Math.random()*27;   // 右下角區域 x：66%~93%
  const ny=79+Math.random()*7;    // y：79%~86%（底部上方）
  const vw=window.innerWidth||1200, vh=window.innerHeight||700;
  const dist=Math.hypot((nx-ox)/100*vw,(ny-oy)/100*vh);
  let dur=dist/46; dur=Math.max(0.8,Math.min(dur,6)); // 定速散步
  const body=d.querySelector(".dogbody");
  if(body&&Math.abs(nx-ox)>0.3)body.style.transform="scaleX("+(nx<ox?1:-1)+")"; // 朝行進方向
  d.style.transition="left "+dur.toFixed(2)+"s linear, top "+dur.toFixed(2)+"s linear";
  d.style.left=nx+"%";d.style.top=ny+"%";d.dataset.x=nx;d.dataset.y=ny;
  clearTimeout(dogTimer);dogTimer=setTimeout(walkDog, dur*1000 + 500 + Math.random()*1800);
}

/* ============ 時間循環 ============ */
function tick(){
  G.plots.forEach(p=>{
    if(p.unlocked&&p.state==="planted"&&!p.ripe){
      let s=1;if(p.dry)s*=.4;if(p.weed)s*=.6;if(p.bug)s*=.6;p.grow+=s;
      if(p.grow>=CROPS[p.crop].grow){p.grow=CROPS[p.crop].grow;p.ripe=true;log(CROPS[p.crop].emoji+CROPS[p.crop].name+" 成熟了，快收成！","g");}
    }
  });
  if(Math.random()<0.12){const pl=G.plots.filter(p=>p.unlocked&&p.state==="planted"&&!p.ripe&&!p.dry&&!p.weed&&!p.bug);if(pl.length){const p=pl[Math.floor(Math.random()*pl.length)];const r=Math.random();if(r<.4)p.dry=true;else if(r<.7)p.weed=true;else{if(Math.random()<.12){p.bug=5;p.bugBig=true;log("出現大毛毛蟲🐛！需噴 5 次","r");}else p.bug=1;}}}
  if(Math.random()<0.35){const rp=G.plots.filter(p=>p.unlocked&&p.state==="planted"&&p.ripe&&p.stolen<2);if(rp.length){const p=rp[Math.floor(Math.random()*rp.length)];const th=G.friends[Math.floor(Math.random()*G.friends.length)];if(G.dog&&G.dog.fed&&Math.random()<dogBiteChance(G.dog.level)){const lv=G.dog.level||1;const d=Math.round((15+Math.random()*30)*(1+(lv-1)*0.6));G.gold+=d;G.dog.fed=Math.random()<.5;log("🐕 看門狗(Lv."+lv+")咬住來偷菜的 "+th.name+"，對方失手掉了 🪙"+d+"！","g");}else{p.stolen++;log(th.av+" "+th.name+" 偷走了你一些 "+CROPS[p.crop].emoji+CROPS[p.crop].name+"…快收成吧！","r");}}}
  if(Math.random()<0.3){const f=G.friends[Math.floor(Math.random()*G.friends.length)];f.plots[Math.floor(Math.random()*f.plots.length)]=makeFriendPlot();}
  // 牧場動物生產
  if(Array.isArray(G.ranch))G.ranch.forEach(s=>{
    if(s&&!s.ready){s.prod+=1;if(s.prod>=ANIMALS[s.a].time){s.prod=ANIMALS[s.a].time;s.ready=true;}}
  });
  render();
  saveGame();
}

/* ============ UI helpers ============ */
function showM(h){document.getElementById("modal").innerHTML=h;document.getElementById("mask").classList.add("on");}
function closeM(){document.getElementById("mask").classList.remove("on");}
document.getElementById("mask").addEventListener("click",e=>{if(e.target.id==="mask")closeM();});
function toggleLog(){document.getElementById("logPanel").classList.toggle("on");}
let logCount=0;
function log(t,cls){const p=document.createElement("p");if(cls)p.innerHTML='<span class="'+cls+'">'+t+'</span>';else p.textContent=t;const l=document.getElementById("logList");l.prepend(p);logCount++;if(logCount>60&&l.lastChild)l.removeChild(l.lastChild);}
let toastT;
function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("on"),1400);}

/* ============ 場景切換（農場 / 牧場）＋ 響應式置中縮放 ============ */
function setScene(s){
  G.scene = (s==="ranch")?"ranch":"farm";
  const sc=document.getElementById("scene");
  if(sc){sc.classList.toggle("s-farm",G.scene==="farm");sc.classList.toggle("s-ranch",G.scene==="ranch");}
  const tf=document.getElementById("tabFarm"), tr=document.getElementById("tabRanch");
  if(tf)tf.classList.toggle("on",G.scene==="farm");
  if(tr)tr.classList.toggle("on",G.scene==="ranch");
  layout(); saveGame();
}
function layout(){
  const vw=window.innerWidth;
  const field=document.querySelector(".field"), gg=document.querySelector(".groundgrid"),
        fs=document.querySelector(".fieldshadow"), pen=document.getElementById("pen");
  if(!field||!gg||!pen||!fs)return;
  const narrow=vw<760;
  // 農場：田一律置中；窄畫面預留左右按鈕列空間，縮小避免重疊
  const avail = narrow ? (vw-168) : (vw*0.62);
  const fScale = Math.max(0.33, Math.min(1, avail/700));
  const ftf="translate(-50%,-50%) scale("+fScale.toFixed(3)+") scaleY(.5) rotate(45deg)";
  field.style.left=gg.style.left="50%";
  field.style.top=gg.style.top= narrow ? "45%" : "52%";
  field.style.transform=gg.style.transform=ftf;
  fs.style.left="50%"; fs.style.top= narrow ? "58%" : "66%"; fs.style.width=(680*fScale).toFixed(0)+"px";
  // 牧場：圍欄置中放大
  const pw=Math.min(720, vw*(narrow?0.9:0.74));
  pen.style.left="50%"; pen.style.top= narrow ? "47%" : "53%";
  pen.style.width=pw.toFixed(0)+"px"; pen.style.height=(pw*340/610).toFixed(0)+"px";
}
window.addEventListener("resize",layout);
window.addEventListener("orientationchange",function(){setTimeout(layout,200);});

/* ============ start ============ */
init();
setScene(G.scene||"farm");
initAuth();
setInterval(tick,1500);
setTimeout(walkDog,700);
/* build-ok */
</script>
